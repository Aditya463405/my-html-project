<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>
<body style="background-color: rgb(185, 237, 235);">
    
    <main>
        <form action="../Day 8/submit.html">
        <fieldset>
            <legend><strong>Student Registration Form</strong></legend>

            <label for="no">Roll No. : <span>*</span></label>
            <input type="number" id="no" name="Student_Roll_No" required>
<br><br>
            <label for="name">Student name :</label>
            <input type="text" id="name" name="Name" placeholder="First Name"> - <input type="text" name="Last_name" placeholder="Last Name">
<br><br>
            <label for="father">Father Name :</label>
            <input type="text" id="father" name="Father_Name" required>
<br><br>
            <label>Date of Birth:</label>
            <select name="day">
                <option value="" disabled selected>Day</option>
                <option value="1">01</option>
                <option value="2">02</option>
                <option value="3">03</option>
                <option value="4">04</option>
                <option value="5">05</option>
                <option value="6">06</option>
                <option value="7">07</option>
                <option value="8">08</option>
                <option value="9">09</option>
                <option value="10">10</option>
                <option value="11">11</option>
                <option value="12">12</option>
                <option value="13">13</option>
                <option value="14">14</option>
                <option value="15">15</option>
                <option value="16">16</option>
                <option value="17">17</option>
                <option value="18">18</option>
                <option value="19">19</option>
                <option value="20">20</option>
                <option value="21">21</option>
                <option value="22">22</option>
                <option value="23">23</option>
                <option value="24">24</option>
                <option value="25">25</option>
                <option value="26">26</option>
                <option value="27">27</option>
                <option value="28">28</option>
                <option value="29">29</option>
                <option value="30">30</option>
                <option value="31">31</option>
            </select>
            -
            <select name="month">
                <option value="" disabled selected >Month</option>
                <option value="jan">Jan</option>
                <option value="feb">Feb</option>
                <option value="march">Mar</option>
                <option value="april">Apr</option>
                <option value="may">May</option>
                <option value="june">Jun</option>
                <option value="july">July</option>
                <option value="august">Aug</option>
                <option value="september">Sep</option>
                <option value="october">Oct</option>
                <option value="November">Nov</option>
                <option value="December">Dec</option>
            </select>
            -
            <select name="year">
                <option value="" disabled selected>Year</option>
                <option value="2000">2000</option>
                <option value="2001">2001</option>
                <option value="2002">2002</option>
                <option value="2003">2003</option>
                <option value="2004">2004</option>
                <option value="2005">2005</option>
                <option value="2006">2006</option>
                <option value="2007">2007</option>
                <option value="2008">2008</option>
                <option value="2009">2009</option>
                <option value="2010">2010</option>
                <option value="2011">2011</option>
                <option value="2012">2012</option>
                <option value="2013">2013</option>
                <option value="2014">2014</option>
                <option value="2015">2015</option>
                <option value="2016">2016</option>
                <option value="2017">2017</option>
                <option value="2018">2018</option>
                <option value="2019">2019</option>
                <option value="2020">2020</option>
                <option value="2021">2021</option>
                <option value="2022">2022</option>
                <option value="2023">2023</option>
                <option value="2024">2024</option>
                <option value="2025">2025</option>
                <option value="2026">2026</option>
            </select>
            (DD-MM-YYYY)
<br><br>
            <label for="number">Mobile no. :</label>
            <input type="text" value="+91" readonly> - <input type="tel" id="number" name="tel" required>
<br><br>
            <label for="email">Email id :</label>
            <input type="email" id="email" name="Email">
<br><br>
            <label for="pass">Password :</label>
            <input type="password" id="pass" name="Password">
<br><br>
            <label>Gender :</label>
            <input type="radio" id="male" name="gender" value="Male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="Female">
            <label for="female">Female</label>
<br><br>
            <label>Department :</label>
            <input type="checkbox" id="cse" name="Department" value="CSE">
            <label for="cse">CSE</label>
            <input type="checkbox" id="it" name="Department" value="It">
            <label for="it">IT</label>
            <input type="checkbox" id="ece" name="Department" value="ECE">
            <label for="ece">ECE</label>
            <input type="checkbox" id="civil" name="Department" value="Civil">
            <label for="civil">Civil</label>
            <input type="checkbox" id="mech" name="Department" value="Mech">
            <label for="mech">Mech</label>
<br><br>
            <label for="course">Course :</label>
            <select id="course" name="Course">
                <option value="" disabled selected>-------- Select Current Course's --------</option>
                <option value="btech">B.Tech</option>
                <option value="mtech">M.Tech</option>
                <option value="Be">B.E</option>
                <option value="Bsc">BSC</option>
                <option value="Phd">Phd</option>
                <option value="Mba">MBA</option>
            </select>
<br><br>
            <label for="photo">Student Photo : </label>
            <input type="file" id="photo" name="Photo" required>
<br><br>
            <label for="city">City :</label>
            <input type="text" id="city" name="city">
<br><br>
            <label for="add">Address :</label>
            <textarea id="add" name="address" required></textarea>
<br><br>
            <input type="submit" value="Register">
            </fieldset>
        </form>
        <br>
    </main>

    <hr>
<footer>
<p>&copy; 2026 Student Registration Form | Created by Aditya</p>
</footer>

</body>
</html>
